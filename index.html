<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>KEL Cyber Labs | SOC & XDR Solutions</title>
    <style>
        :root { --bg-main: #040811; --cyber-green: #00e676; --cyber-blue: #00b0ff; }
        body { background-color: var(--bg-main); color: #fff; font-family: sans-serif; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .btn { background: var(--cyber-blue); color: #fff; padding: 15px 30px; text-decoration: none; display: inline-block; margin-top: 20px; }
        .solution-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .card { background: #0b111e; padding: 20px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>KEL Cyber Labs - Giải Pháp An Ninh Mạng</h1>
        <p>Từ EDR Foundation đến XDR nâng cao cho doanh nghiệp.</p>
        
        <div class="solution-grid">
            <div class="card">
                <h3>EDR Foundation</h3>
                <p>Bảo mật điểm cuối, chống mã độc thông minh.</p>
            </div>
            <div class="card">
                <h3>XDR Advanced</h3>
                <p>Phản ứng mở rộng, tích hợp toàn diện mọi lớp bảo mật.</p>
            </div>
        </div>

        <a href="https://docs.google.com/document/d/1hdZ6Z8Rr7q0Tz4uHxJ9jE1qSNsB5Tg1jE5EJHkJR2K4/edit" class="btn">Xem Chi Tiết Bảng Giá & Giải Pháp</a>

        <form class="contact-form" action="https://formspree.io/f/xeebjplj" method="POST" style="margin-top: 50px;">
            <h3>Liên Hệ Tư Vấn</h3>
            <input type="text" name="name" placeholder="Tên đơn vị" required style="width:100%; padding:10px; margin-bottom:10px;"><br>
            <input type="email" name="email" placeholder="Email" required style="width:100%; padding:10px; margin-bottom:10px;"><br>
            <textarea name="message" placeholder="Nội dung yêu cầu" rows="5" style="width:100%; padding:10px;"></textarea><br>
            <button type="submit" style="padding:10px 20px;">Gửi Yêu Cầu</button>
        </form>
    </div>
</body>
</html>
